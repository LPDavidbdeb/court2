services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: court_v2_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev_secret_key"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: court_v2_db
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8001/api

volumes:
  postgres_data:
